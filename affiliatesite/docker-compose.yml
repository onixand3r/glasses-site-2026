services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GHOST_API_URL=http://ghost:2368
      - GHOST_CONTENT_API_KEY=${GHOST_CONTENT_API_KEY}
    depends_on:
      ghost:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - affiliate-network

  # Ghost CMS
  ghost:
    image: ghost:5-alpine
    ports:
      - "2368:2368"
    environment:
      - database__client=mysql
      - database__connection__host=db
      - database__connection__user=ghost
      - database__connection__password=${MYSQL_PASSWORD:-ghostpass}
      - database__connection__database=ghost
      - url=${GHOST_URL:-http://localhost:2368}
      - admin__url=${GHOST_ADMIN_URL:-http://localhost:2368}
      - mail__transport=SMTP
      - mail__options__host=${SMTP_HOST:-}
      - mail__options__port=${SMTP_PORT:-587}
      - mail__options__auth__user=${SMTP_USER:-}
      - mail__options__auth__pass=${SMTP_PASS:-}
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - affiliate-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2368/ghost/api/v4/admin/site/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database for Ghost
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=ghost
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ghostpass}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - affiliate-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ghost_content:
  mysql_data:

networks:
  affiliate-network:
    driver: bridge
